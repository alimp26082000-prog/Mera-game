<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
    databaseURL: "https://vlog-trading-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user;
let balance = 0;
let selCol = null;
let period = 20260308001;
let timer = 60;
let currentOrder = null;

function login(){

    user = document.getElementById('phone').value;

    if(!user || user.length < 10){
        alert("Invalid Number");
        return;
    }

    document.getElementById('loginBox').style.display='none';
    document.getElementById('gameBox').style.display='block';

    loadData();
    startTimer();
}

function startTimer(){

    setInterval(function(){

        timer--;

        if(timer <= 0){
            calculateResult();
            timer = 60;
            period++;
        }

        document.getElementById('secs').innerText = timer;
        document.getElementById('periodId').innerText = period;

    },1000);

}

function loadData(){

    db.ref('users/'+user).on('value',function(s){

        if(s.val()){
            balance = s.val().balance || 0;
        }else{
            balance = 0;
        }

        document.getElementById('userBalance').innerText = "₹"+balance.toFixed(2);

    });

    db.ref('gameHistory').limitToLast(20).on('value',function(snap){

        let html = "";
        let list = [];

        snap.forEach(function(x){
            list.unshift(x.val());
        });

        list.forEach(function(r){

            let color = r.color=="Red" ? "red" :
                        r.color=="Green" ? "green" : "violet";

            html += `<tr>
            <td>${r.period}</td>
            <td>${r.num}</td>
            <td style="color:${color}">${r.color}</td>
            </tr>`;

        });

        document.getElementById('historyBody').innerHTML = html;

    });

}

function selColor(c){

    selCol = c;
    alert("Selected : "+c);

}

function placeOrder(){

    let amt = parseInt(document.getElementById('betAmt').value);

    if(!selCol || !amt || balance < amt){
        alert("Check color or balance");
        return;
    }

    db.ref('users/'+user).update({
        balance: balance-amt
    });

    db.ref('currentBets/'+selCol).transaction(function(c){
        return (c||0)+amt;
    });

    currentOrder = {color:selCol,amt:amt};

    alert("Bet Placed");

}

async function calculateResult(){

    let snap = await db.ref('currentBets').once('value');

    let bets = snap.val() || {Green:0,Red:0,Violet:0};

    let winner = "Green";

    if(bets.Red <= bets.Green && bets.Red <= bets.Violet){
        winner="Red";
    }
    else if(bets.Violet <= bets.Green && bets.Violet <= bets.Red){
        winner="Violet";
    }

    let num;

    if(winner=="Green"){
        let arr=[1,3,7,9];
        num=arr[Math.floor(Math.random()*arr.length)];
    }
    else if(winner=="Red"){
        let arr=[2,4,6,8];
        num=arr[Math.floor(Math.random()*arr.length)];
    }
    else{
        num=5;
    }

    let newRef=db.ref('gameHistory').push();

    await newRef.set({
        period:period,
        color:winner,
        num:num,
        time:Date.now()
    });

    let historySnap = await db.ref('gameHistory').once('value');

    if(historySnap.numChildren()>20){

        let removeCount = historySnap.numChildren()-20;
        let i=0;

        historySnap.forEach(function(child){

            if(i<removeCount){
                db.ref('gameHistory/'+child.key).remove();
                i++;
            }

        });

    }

    if(currentOrder){

        if(currentOrder.color==winner){

            let winAmt=currentOrder.amt*1.9;

            db.ref('users/'+user).transaction(function(u){

                if(u){
                    u.balance=(u.balance||0)+winAmt;
                }

                return u;

            });

            alert("You Won ₹"+winAmt);

        }
        else{
            alert("You Lost");
        }

    }

    db.ref('currentBets').set({
        Green:0,
        Red:0,
        Violet:0
    });

    currentOrder=null;

}
    </script>
