<script>
const firebaseConfig = { databaseURL: "https://vlog-trading-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user, balance, selCol, tapCount = 0;
let period = 20260308001, timer = 60;
let currentOrder = null;

function login() {
    user = document.getElementById('phone').value;
    if(user.length < 10) return alert("Invalid Number");
    document.getElementById('loginBox').style.display='none';
    document.getElementById('gameBox').style.display='block';
    loadData(); 
    startTimer();
}

function startTimer() {
    setInterval(() => {
        timer--;
        if(timer <= 0) { 
            calculateResult(); 
            timer = 60; 
            period++; 
        }
        document.getElementById('secs').innerText = timer;
        document.getElementById('periodId').innerText = period;
    }, 1000);
}

function loadData() {

    db.ref('users/'+user).on('value', s => {
        balance = s.val() ? (s.val().balance || 0) : 0;
        document.getElementById('userBalance').innerText = "₹" + balance.toFixed(2);
    });

    // LAST 20 RESULT SHOW
    db.ref('gameHistory').limitToLast(20).on('value', snap => {
        let html = "";
        let list = [];

        snap.forEach(x => { list.unshift(x.val()); });

        list.forEach(r => {

            let color = r.color === 'Red' ? 'var(--red)' :
                       (r.color === 'Green' ? 'var(--green)' : 'var(--violet)');

            html += `<tr>
                        <td>${r.period}</td>
                        <td><b style="color:var(--gold)">${r.num}</b></td>
                        <td><span class="dot" style="background:${color}"></span>${r.color}</td>
                     </tr>`;
        });

        document.getElementById('historyBody').innerHTML = html || "<tr><td colspan='3'>History Loading...</td></tr>";
    });

}

function selColor(c) {
    selCol = c;
    alert("Selected: " + c);
}

function placeOrder() {

    let amt = parseInt(document.getElementById('betAmt').value);

    if(!selCol || isNaN(amt) || balance < amt) 
        return alert("Select color or check balance!");

    db.ref('users/'+user).update({
        balance: balance - amt
    });

    db.ref('currentBets/'+selCol).transaction(c => (c || 0) + amt);

    currentOrder = { color: selCol, amt: amt };

    alert("Order Placed Successfully!");

    document.getElementById('betAmt').value = "";
}

async function calculateResult() {

    let bets = (await db.ref('currentBets').once('value')).val() || {Green:0, Red:0, Violet:0};

    let winner = "Green";

    if(bets.Red <= bets.Green && bets.Red <= bets.Violet) {
        winner = "Red";
    } 
    else if(bets.Violet <= bets.Green && bets.Violet <= bets.Red) {
        winner = "Violet";
    }

    let num = (winner === "Green") ? 
        [1,3,7,9][Math.floor(Math.random()*4)] :
        (winner === "Red") ? 
        [2,4,6,8][Math.floor(Math.random()*4)] : 5;

    // RESULT SAVE
    let newResult = db.ref('gameHistory').push();

    await newResult.set({
        period: period,
        color: winner,
        num: num,
        timestamp: Date.now()
    });

    // ONLY KEEP LAST 20 RESULTS
    let snap = await db.ref('gameHistory').once('value');

    if(snap.numChildren() > 20){

        let removeCount = snap.numChildren() - 20;
        let i = 0;

        snap.forEach(child => {

            if(i < removeCount){
                db.ref('gameHistory/'+child.key).remove();
                i++;
            }

        });

    }

    // WIN / LOSS

    if(currentOrder) {

        if(currentOrder.color === winner) {

            let winAmt = currentOrder.amt * 1.9;

            db.ref('users/'+user).transaction(u => {
                if(u) u.balance = (u.balance || 0) + winAmt;
                return u;
            });

            alert("🎉 CONGRATULATIONS! You Won ₹" + winAmt.toFixed(2));

        } 
        else {

            alert("💔 BETTER LUCK NEXT TIME! You Lost.");

        }

    }

    db.ref('currentBets').set({Green:0, Red:0, Violet:0});

    currentOrder = null;
}

</script>
