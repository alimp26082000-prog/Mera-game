<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGold Pro - Fast Login</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #061118; --card: #152026; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; text-align: center; }
        .card { background: var(--card); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .balance-card { background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 25px; border-radius: 0 0 25px 25px; }
        .balance-amt { font-size: 32px; font-weight: bold; color: var(--gold); cursor: pointer; }
        .btn-bet { width: 30%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; background: #000; }
        th, td { padding: 12px; border-bottom: 1px solid #222; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); z-index: 1000; width: 85%; max-width: 400px; box-shadow: 0 0 100px #000; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; font-size: 16px; }
        
        /* Admin Section */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; overflow-y: auto; padding: 20px; text-align: left; }
        .admin-item { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--gold); }
        .admin-btn { background: var(--green); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginBox" style="height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 350px; padding: 30px;">
        <h1 style="color:var(--gold); margin-bottom: 5px;">WinGold Pro</h1>
        <p style="color: #888; margin-bottom: 30px;">Enter Mobile to Start Game</p>
        
        <input type="number" id="phone" placeholder="Enter Mobile Number">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; font-size: 16px; cursor: pointer; margin-top: 10px;">LOGIN</button>
    </div>
</div>

<div id="gameBox" style="display:none;">
    <div class="balance-card">
        <span style="opacity:0.8;">Total Balance</span><br>
        <span class="balance-amt" id="userBalance" onclick="handleAdminTap()">₹0.00</span>
        <div style="margin-top:15px; display: flex; justify-content: center; gap: 10px;">
            <button onclick="showPop('depSec')" style="background:var(--green); border:none; color:white; padding:10px 25px; border-radius:10px; font-weight:bold;">Deposit</button>
            <button onclick="showPop('wdSec')" style="background:var(--red); border:none; color:white; padding:10px 25px; border-radius:10px; font-weight:bold;">Withdraw</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px;">
            <span>Period: <b id="periodId" style="color:var(--gold)">--</b></span>
            <span>Time: <b id="secs" style="color:var(--red)">60</b>s</span>
        </div>
        <div style="display:flex; justify-content:space-around; margin-bottom: 15px;">
            <button class="btn-bet" style="background:var(--green)" onclick="openBet('Green')">Green</button>
            <button class="btn-bet" style="background:var(--violet)" onclick="openBet('Violet')">Violet</button>
            <button class="btn-bet" style="background:var(--red)" onclick="openBet('Red')">Red</button>
        </div>
        <button onclick="window.open('https://wa.me/91XXXXXXXXXX')" style="width:100%; background: #25D366; color:white; border:none; padding:12px; border-radius:10px; font-weight: bold;">WhatsApp Support</button>
    </div>

    <div class="card">
        <h4 style="text-align:left; color:var(--gold); margin-top: 0;">📊 Recent 20 Results</h4>
        <table>
            <thead><tr><th>Period</th><th>Num</th><th>Color</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<div id="adminPanel">
    <h2 style="color:var(--gold)">MASTER ADMIN</h2>
    <div id="adminArea">
        <h3 style="color:var(--green)">Deposits</h3>
        <div id="depList"></div>
        <h3 style="color:var(--red); margin-top: 20px;">Withdrawals</h3>
        <div id="wdList"></div>
    </div>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:15px; background:white; color:black; font-weight:bold; border-radius:10px; margin-top: 30px;">CLOSE</button>
</div>

<div id="betModal" class="popup">
    <h3 id="betTitle">Join</h3>
    <input type="number" id="betAmtInput" value="10">
    <button onclick="confirmBet()" style="width:100%; padding:15px; background:var(--green); color:white; border:none; border-radius:10px; font-weight:bold;">CONFIRM</button>
    <button onclick="closePop()" style="background:none; border:none; color:#888; margin-top:10px;">Cancel</button>
</div>

<div id="depSec" class="popup">
    <h3>Deposit</h3>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=Poonamlondhe52-1@okhdfcbank&pn=WinGold&cu=INR" style="background:white; padding:10px; border-radius:10px;">
    <p style="font-size: 13px;">UPI: <b>Poonamlondhe52-1@okhdfcbank</b></p>
    <input type="number" id="dAmount" placeholder="Amount (₹)">
    <input type="text" id="dUtr" placeholder="12 Digit UTR Number">
    <button onclick="submitDep()" style="width:100%; background:var(--green); border:none; color:white; padding:12px; border-radius:10px; font-weight:bold;">SUBMIT</button>
    <button onclick="closePop()" style="background:none; border:none; color:#888; margin-top:10px;">Close</button>
</div>

<div id="wdSec" class="popup">
    <h3>Withdraw</h3>
    <input type="number" id="wAmount" placeholder="Min ₹200">
    <input type="text" id="wUpi" placeholder="Enter UPI ID">
    <button onclick="submitWd()" style="width:100%; background:var(--red); border:none; color:white; padding:12px; border-radius:10px; font-weight:bold;">WITHDRAW</button>
    <button onclick="closePop()" style="background:none; border:none; color:#888; margin-top:10px;">Close</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://vlog-trading-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, balance = 0, currentBet = null, tapCount = 0;
    let period = 20260308001, timer = 60;

    function login() {
        let p = document.getElementById('phone').value;
        if(p.length < 10) return alert("Please enter 10 digit number");
        user = p;
        document.getElementById('loginBox').style.display='none';
        document.getElementById('gameBox').style.display='block';
        loadUserData(); startTimer();
    }

    function startTimer() {
        setInterval(() => {
            timer--;
            if(timer <= 0) { generateResult(); timer = 60; period++; }
            document.getElementById('secs').innerText = timer;
            document.getElementById('periodId').innerText = period;
        }, 1000);
        loadHistory();
    }

    function loadUserData() {
        db.ref('users/'+user).on('value', s => {
            balance = s.val() ? s.val().balance : 0;
            document.getElementById('userBalance').innerText = "₹" + balance.toFixed(2);
        });
    }

    function loadHistory() {
        db.ref('gameHistory').limitToLast(20).on('value', s => {
            let html = ""; let list = [];
            s.forEach(x => { list.unshift(x.val()); });
            list.forEach(x => {
                let c = x.color === 'Red' ? '#e74c3c' : (x.color === 'Green' ? '#2ecc71' : '#9b59b6');
                html += `<tr><td>${x.period}</td><td style="color:var(--gold)">${x.num}</td><td><span class="dot" style="background:${c}"></span>${x.color}</td></tr>`;
            });
            document.getElementById('historyBody').innerHTML = html || "<tr><td colspan='3'>Game Starting...</td></tr>";
        });
    }

    function openBet(col) { currentBetColor = col; document.getElementById('betTitle').innerText = "Join " + col; document.getElementById('betModal').style.display='block'; }
    function closePop() { document.querySelectorAll('.popup').forEach(p => p.style.display='none'); }
    function showPop(id) { document.getElementById(id).style.display='block'; }

    function confirmBet() {
        let amt = parseInt(document.getElementById('betAmtInput').value);
        if(balance >= amt && amt > 0) {
            db.ref('users/'+user).update({ balance: balance - amt });
            db.ref('admin/totalBets/'+currentBetColor).transaction(c => (c || 0) + amt);
            currentBet = { color: currentBetColor, amt: amt };
            closePop(); alert("Bet Placed!");
        } else { alert("Insufficient Balance!"); }
    }

    async function generateResult() {
        let bets = (await db.ref('admin/totalBets').once('value')).val() || {Green:0, Red:0, Violet:0};
        let winner = "Green";
        if(bets.Red <= bets.Green && bets.Red <= bets.Violet) winner = "Red";
        else if(bets.Violet <= bets.Green && bets.Violet <= bets.Red) winner = "Violet";
        
        let num = Math.floor(Math.random()*10);
        db.ref('gameHistory').push({ period: period, color: winner, num: num });

        if(currentBet && currentBet.color === winner) {
            db.ref('users/'+user).transaction(c => { return { balance: (c?c.balance:0) + (currentBet.amt * 1.9) }; });
        }
        db.ref('admin/totalBets').set({Green:0, Red:0, Violet:0});
        currentBet = null;
    }

    function handleAdminTap() {
        tapCount++;
        if(tapCount === 3) {
            if(prompt("Admin Pass:") === "786786") {
                document.getElementById('adminPanel').style.display='block';
                loadAdmin();
            }
            tapCount = 0;
        }
    }

    function loadAdmin() {
        db.ref('admin').on('value', s => {
            let data = s.val() || {};
            let dH = "", wH = "";
            for(let k in data.depRequests) {
                let r = data.depRequests[k];
                dH += `<div class="admin-item">User: ${r.user} | ₹${r.a}<br>UTR: ${r.u}<br><button class="admin-btn" onclick="approveDep('${k}','${r.user}',${r.a})">APPROVE</button></div>`;
            }
            for(let k in data.wdRequests) {
                let r = data.wdRequests[k];
                wH += `<div class="admin-item">User: ${r.user} | ₹${r.a}<br>UPI: ${r.upi}<br><button class="admin-btn" style="background:var(--red)" onclick="db.ref('admin/wdRequests/${k}').remove()">PAID</button></div>`;
            }
            document.getElementById('depList').innerHTML = dH || "No Deposits";
            document.getElementById('wdList').innerHTML = wH || "No Withdrawals";
        });
    }

    function approveDep(k,u,a) {
        db.ref('users/'+u).transaction(c => { return { balance: (c?c.balance:0) + parseInt(a) }; });
        db.ref('admin/depRequests/'+k).remove();
        alert("Paisa Add Ho Gaya!");
    }

    function submitDep() { 
        let a = document.getElementById('dAmount').value, u = document.getElementById('dUtr').value;
        if(a && u) { db.ref('admin/depRequests').push({ user, a, u }); alert("Request Sent!"); closePop(); }
    }
    function submitWd() { 
        let a = document.getElementById('wAmount').value, u = document.getElementById('wUpi').value;
        if(a >= 200 && balance >= a) { 
            db.ref('users/'+user).update({ balance: balance - a });
            db.ref('admin/wdRequests').push({ user, a, upi: u }); 
            alert("Withdraw Sent!"); closePop(); 
        } else { alert("Invalid Amount!"); }
    }
</script>
</body>
</html>
