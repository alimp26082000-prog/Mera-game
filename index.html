<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGold Premium Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #f1c40f; --dark: #0b141a; --card: #1c2c33; --green: #2ecc71; --red: #e74c3c; --violet: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 10px; text-align: center; }
        .card { background: var(--card); padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: 10px auto; border: 1px solid #33444d; }
        .balance-card { background: linear-gradient(45deg, #1e3c72, #2a5298); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .balance-amt { font-size: 32px; font-weight: bold; color: var(--gold); cursor: pointer; }
        .game-grid { display: flex; justify-content: space-around; margin: 20px 0; }
        .btn-bet { width: 30%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; color: white; cursor: pointer; }
        .green { background: var(--green); } .red { background: var(--red); } .violet { background: var(--violet); }
        .multiplier-bar { display: flex; justify-content: center; gap: 5px; margin: 15px 0; flex-wrap: wrap; }
        .mult-btn { background: #33444d; border: none; color: white; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .mult-btn.active { background: var(--gold); color: black; font-weight: bold; }
        .popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--gold); z-index: 10000; width: 85%; }
        #adminPanel { display: none; background: #000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .section { display: none; text-align: left; margin-top: 15px; padding: 15px; background: #0b141a; border-radius: 10px; border: 1px solid #33444d; }
        input { width: 92%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #26353d; color: white; }
    </style>
</head>
<body>

<div id="loginBox" class="card">
    <h2 style="color:var(--gold)">WINGOLD PRO</h2>
    <input type="number" id="phone" placeholder="Mobile Number">
    <input type="password" id="pin" placeholder="Security PIN">
    <button onclick="login()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">START WINNING</button>
</div>

<div id="gameBox" style="display:none;">
    <div class="balance-card">
        <div style="font-size: 14px; opacity: 0.8;">Available Balance</div>
        <div class="balance-amt" id="userBalance" onclick="handleAdminTap()">₹0.00</div>
        <div style="margin-top: 15px;">
            <button onclick="showSec('depSec')" style="background:var(--green); color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer;">Deposit</button>
            <button onclick="showSec('wdSec')" style="background:var(--red); color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer;">Withdraw</button>
        </div>
    </div>

    <div class="card">
        <h3>Predict Next Colour</h3>
        <div id="timer">Period: 20260308001 | Time: <span id="secs" style="color:var(--gold)">30</span>s</div>
        <div class="game-grid">
            <button class="btn-bet green" onclick="openBet('Green')">Green</button>
            <button class="btn-bet violet" onclick="openBet('Violet')">Violet</button>
            <button class="btn-bet red" onclick="openBet('Red')">Red</button>
        </div>
        <button onclick="showSec('suppSec')" style="width:100%; background:#3498db; border:none; color:white; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">Customer Support</button>
    </div>

    <div id="betModal" class="popup">
        <h3 id="betTitle">Join Green</h3>
        <div class="multiplier-bar">
            <button class="mult-btn" onclick="setMult(1, this)">1x</button>
            <button class="mult-btn" onclick="setMult(5, this)">5x</button>
            <button class="mult-btn" onclick="setMult(10, this)">10x</button>
            <button class="mult-btn" onclick="setMult(50, this)">50x</button>
            <button class="mult-btn" onclick="setMult(100, this)">100x</button>
        </div>
        <p style="font-size:18px;">Total Amount: <span id="finalAmt" style="color:var(--gold); font-weight:bold;">₹10</span></p>
        <button onclick="confirmBet()" style="background:var(--green); color:white; border:none; padding:12px 40px; border-radius:10px; font-weight:bold; cursor:pointer;">Confirm Bet</button>
        <button onclick="closePop()" style="display:block; width:100%; background:none; color:#aaa; border:none; margin-top:15px; cursor:pointer;">Cancel</button>
    </div>

    <div id="winPop" class="popup">
        <h1 style="color:var(--gold)">WINNING! 🏆</h1>
        <p style="font-size: 20px;">You Won: <span id="winAmt" style="color:var(--green)">₹0</span></p>
        <button onclick="closePop()" style="background:var(--gold); border:none; padding:12px 40px; border-radius:10px; font-weight:bold; cursor:pointer;">Claim Reward</button>
    </div>

    <div id="depSec" class="section">
        <h4>Deposit Money</h4>
        <div style="text-align:center; background:white; padding:15px; border-radius:15px; margin-bottom:15px;">
            <img id="qrImg" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=Poonamlondhe52-1@okhdfcbank&pn=WinGold&am=500&cu=INR" style="width:180px;">
        </div>
        <p>UPI ID: <b style="color:var(--gold)">Poonamlondhe52-1@okhdfcbank</b></p>
        <input type="number" id="dAmount" placeholder="Enter Amount (₹)">
        <input type="text" id="dUtr" placeholder="Enter 12 Digit UTR / Ref No.">
        <button onclick="submitDep()" style="width:100%; background:var(--green); border:none; color:white; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">I Have Paid</button>
    </div>

    <div id="wdSec" class="section">
        <h4>Withdrawal</h4>
        <input type="number" id="wAmount" placeholder="Amount (Min ₹200)">
        <input type="text" id="wUpi" placeholder="Your UPI ID for Payment">
        <button onclick="submitWd()" style="width:100%; background:var(--red); border:none; color:white; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">Request Withdrawal</button>
    </div>

    <div id="suppSec" class="section">
        <h4>Admin Support</h4>
        <div id="chatBox" style="height:180px; background:#26353d; overflow-y:auto; padding:10px; border-radius:10px; margin-bottom:10px; font-size:14px;"></div>
        <input type="text" id="chatInput" placeholder="Write your message...">
        <button onclick="sendMsg()" style="width:100%; background:#3498db; border:none; color:white; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">Send Message</button>
    </div>
</div>

<div id="adminPanel">
    <h2 style="color:var(--gold)">ADMIN DASHBOARD</h2>
    <div id="adminBody"></div>
    <button onclick="closeAdmin()" style="margin-top:20px; padding:15px 40px; background:white; border-radius:10px; font-weight:bold; cursor:pointer;">Close Admin</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://vlog-trading-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, balance = 0, currentMult = 1, currentBetColor = "", tapCount = 0;

    function login() {
        let p = document.getElementById('phone').value;
        if(p.length < 10) return alert("Sahi number dalein");
        user = p; document.getElementById('loginBox').style.display='none'; document.getElementById('gameBox').style.display='block';
        loadUser();
    }

    function loadUser() {
        db.ref('users/'+user).on('value', s => {
            balance = s.val() ? s.val().balance : 0;
            document.getElementById('userBalance').innerText = "₹" + balance.toFixed(2);
        });
        db.ref('chats/'+user).on('value', s => {
            let h = ""; s.forEach(m => { h += `<div style="margin-bottom:8px; text-align:${m.val().sender=='Admin'?'left':'right'}"><b>${m.val().sender}:</b> ${m.val().txt}</div>`; });
            document.getElementById('chatBox').innerHTML = h;
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });
    }

    function openBet(col) { currentBetColor = col; document.getElementById('betTitle').innerText = "Join " + col; document.getElementById('betModal').style.display='block'; setMult(1); }
    function setMult(m, btn) { 
        currentMult = m; 
        document.getElementById('finalAmt').innerText = "₹" + (10 * m); 
        document.querySelectorAll('.mult-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
    }
    function closePop() { document.querySelectorAll('.popup').forEach(p => p.style.display='none'); }

    function confirmBet() {
        let amt = 10 * currentMult;
        if(balance >= amt) {
            balance -= amt;
            db.ref('users/'+user).update({ balance: balance });
            db.ref('admin/totalBets/'+currentBetColor).transaction(curr => (curr || 0) + amt);
            closePop();
            setTimeout(processResult, 2000);
        } else { alert("Insufficient Balance!"); }
    }

    async function processResult() {
        let bets = (await db.ref('admin/totalBets').once('value')).val() || {Green:0, Red:0, Violet:0};
        let winner = "Green";
        if(bets.Red <= bets.Green && bets.Red <= bets.Violet) winner = "Red";
        else if(bets.Violet <= bets.Green && bets.Violet <= bets.Red) winner = "Violet";
        
        if(currentBetColor === winner) {
            let win = (10 * currentMult) * 1.9;
            db.ref('users/'+user).transaction(c => { return { balance: (c ? c.balance : 0) + win }; });
            document.getElementById('winAmt').innerText = "₹" + win.toFixed(2);
            document.getElementById('winPop').style.display='block';
        } else { alert("Result was " + winner + ". Try again!"); }
        db.ref('admin/totalBets').set({Green:0, Red:0, Violet:0});
    }

    function submitDep() {
        let a = document.getElementById('dAmount').value;
        let u = document.getElementById('dUtr').value;
        if(a && u) { db.ref('admin/depRequests').push({ user, a, u }); alert("Request Submitted! Admin will verify UTR."); }
    }

    function submitWd() {
        let a = document.getElementById('wAmount').value;
        if(a <= balance && a >= 200) {
            db.ref('users/'+user).update({ balance: balance - a });
            db.ref('admin/wdRequests').push({ user, a, upi: document.getElementById('wUpi').value });
            alert("Withdrawal Requested Successfully!");
        } else { alert("Minimum ₹200 and sufficient balance required!"); }
    }

    function sendMsg() {
        let t = document.getElementById('chatInput').value;
        if(t) { db.ref('chats/'+user).push({ sender: 'User', txt: t }); document.getElementById('chatInput').value=""; }
    }

    function showSec(id) { document.querySelectorAll('.section').forEach(s => s.style.display='none'); document.getElementById(id).style.display='block'; }

    function handleAdminTap() {
        tapCount++;
        if(tapCount === 3) {
            let p = prompt("Enter Master Password:");
            if(p === "786786786") { document.getElementById('adminPanel').style.display='block'; loadAdmin(); }
            tapCount = 0;
        }
    }

    function loadAdmin() {
        db.ref('admin').on('value', s => {
            let d = s.val(); let h = "<h3>Deposit Requests</h3>";
            for(let k in d.depRequests) h += `<div style='border-bottom:1px solid #333; padding:10px;'>User: ${d.depRequests[k].user}<br>Amt: ₹${d.depRequests[k].a}<br>UTR: ${d.depRequests[k].u}<br><button onclick="appDep('${k}','${d.depRequests[k].user}',${d.depRequests[k].a})">Approve</button></div>`;
            h += "<h3>Withdrawal Requests</h3>";
            for(let k in d.wdRequests) h += `<div style='border-bottom:1px solid #333; padding:10px;'>User: ${d.wdRequests[k].user}<br>Amt: ₹${d.wdRequests[k].a}<br>UPI: ${d.wdRequests[k].upi}<br><button onclick="db.ref('admin/wdRequests/${k}').remove()">Mark Done</button></div>`;
            document.getElementById('adminBody').innerHTML = h;
        });
    }

    function appDep(k, u, a) {
        db.ref('users/'+u).transaction(c => { return { balance: (c ? c.balance : 0) + parseInt(a) }; });
        db.ref('admin/depRequests/'+k).remove();
    }
    function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
</script>
</body>
</html>
